<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="35%" stop-color="#A78BFA"/>
      <stop offset="70%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feFlood flood-color="#4C1D95" flood-opacity="0.35"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="200" r="180" fill="url(#glow)"/>

  <g filter="url(#softShadow)">
    <path d="M310 280 Q360 250 370 200 Q375 170 365 145 Q345 165 330 195 Q325 225 310 250 Z" fill="url(#wingGrad)"/>
    <path d="M315 270 Q345 245 355 215" stroke="#6D28D9" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M320 260 Q340 240 345 215" stroke="#6D28D9" stroke-width="1.5" fill="none" opacity="0.4"/>

    <ellipse cx="220" cy="295" rx="95" ry="65" fill="url(#bodyGrad)"/>

    <path d="M180 320 Q260 360 320 310 Q340 300 330 280 Q300 290 260 295 Q230 297 200 290 Z" fill="url(#bellyGrad)" opacity="0.8"/>

    <path d="M310 305 Q360 320 380 300 Q395 285 385 270 Q380 280 365 285 Q345 290 325 285 Z" fill="url(#bodyGrad)"/>
    <path d="M380 295 Q392 290 395 285" stroke="#6D28D9" stroke-width="2" fill="none"/>

    <ellipse cx="170" cy="200" rx="80" ry="85" fill="url(#bodyGrad)"/>

    <path d="M110 165 L100 130 L130 150 Z" fill="url(#bodyGrad)"/>
    <path d="M150 140 L140 105 L170 125 Z" fill="url(#bodyGrad)"/>
    <path d="M190 130 L185 95 L215 115 Z" fill="url(#bodyGrad)"/>

    <ellipse cx="150" cy="240" rx="22" ry="18" fill="url(#bellyGrad)" opacity="0.7"/>

    <circle cx="135" cy="185" r="14" fill="#fff"/>
    <circle cx="190" cy="185" r="14" fill="#fff"/>
    <circle cx="135" cy="187" r="9" fill="url(#eyeGrad)"/>
    <circle cx="190" cy="187" r="9" fill="url(#eyeGrad)"/>
    <circle cx="135" cy="187" r="4" fill="#1E1033"/>
    <circle cx="190" cy="187" r="4" fill="#1E1033"/>
    <circle cx="137" cy="184" r="2" fill="#fff"/>
    <circle cx="192" cy="184" r="2" fill="#fff"/>

    <ellipse cx="115" cy="225" rx="4" ry="3" fill="#1E1033" opacity="0.6"/>
    <ellipse cx="125" cy="232" rx="3" ry="2" fill="#1E1033" opacity="0.6"/>

    <path d="M150 245 Q165 258 180 245" stroke="#1E1033" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M155 248 L152 254 M170 252 L172 258" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <g opacity="0.6">
    <circle cx="80" cy="120" r="3" fill="#A78BFA"/>
    <circle cx="320" cy="100" r="2" fill="#A78BFA"/>
    <circle cx="350" cy="180" r="3" fill="#C4B5FD"/>
    <circle cx="60" cy="240" r="2" fill="#A78BFA"/>
    <circle cx="340" cy="320" r="3" fill="#C4B5FD"/>
  </g>
</svg>
